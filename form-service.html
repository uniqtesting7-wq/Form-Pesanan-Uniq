  <style>
    :root {
      --navy:#0f1f5c; --blue:#1e3a8a; --mid:#2563eb; --sky:#3b82f6;
      --light:#93c5fd; --accent:#60a5fa; --bg:#f0f4fa; --card:#fff;
      --border:#e2e8f0; --muted:#94a3b8; --text:#1e293b; --sub:#64748b;
      --shadow:0 2px 16px rgba(15,31,92,0.08); --shadow-md:0 6px 28px rgba(15,31,92,0.12);
      --r:16px;
      /* Status colors */
      --s-masuk:   #f59e0b; --s-masuk-bg:   #fffbeb; --s-masuk-border:   #fde68a;
      --s-proses:  #3b82f6; --s-proses-bg:  #eff6ff; --s-proses-border:  #bfdbfe;
      --s-selesai: #8b5cf6; --s-selesai-bg: #f5f3ff; --s-selesai-border: #ddd6fe;
      --s-diambil: #22c55e; --s-diambil-bg: #f0fdf4; --s-diambil-border: #bbf7d0;
    }
    *{box-sizing:border-box;}
    body{background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);margin:0;}

    /* ── SIDEBAR ──────────────────────────────────────── */
    .sidebar{position:fixed;top:0;left:0;height:100vh;width:260px;background:linear-gradient(175deg,var(--navy) 0%,var(--blue) 55%,var(--mid) 100%);display:flex;flex-direction:column;z-index:200;box-shadow:6px 0 30px rgba(15,31,92,0.22);transition:transform .35s cubic-bezier(.4,0,.2,1);}
    .sb-brand{padding:26px 20px 20px;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;gap:13px;}
    .sb-brand .icon{font-size:30px;}
    .sb-brand .name{font-size:11px;font-weight:900;color:#fff;letter-spacing:1.5px;line-height:1.2;}
    .sb-brand .sub{font-size:9px;color:rgba(255,255,255,.45);letter-spacing:2.5px;}
    .sb-nav{flex:1;padding:16px 12px;overflow-y:auto;}
    .nav-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:2.5px;padding:14px 10px 6px;text-transform:uppercase;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:11px;color:rgba(255,255,255,.65);text-decoration:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;margin-bottom:2px;}
    .nav-item:hover{background:rgba(255,255,255,.1);color:#fff;transform:translateX(2px);}
    .nav-item.active{background:rgba(255,255,255,.16);color:#fff;box-shadow:inset 3px 0 0 var(--light);}
    .nav-item i{font-size:16px;width:20px;text-align:center;}
    .sb-footer{padding:14px 12px;border-top:1px solid rgba(255,255,255,.1);}
    .user-chip{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,.08);border-radius:11px;}
    .user-chip .av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--light));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;}
    .user-chip .un{font-size:12px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .user-chip .ur{font-size:10px;color:rgba(255,255,255,.45);}
    .user-chip .lo{background:none;border:none;color:rgba(255,255,255,.45);cursor:pointer;font-size:16px;padding:2px;transition:color .15s;margin-left:auto;}
    .user-chip .lo:hover{color:#fff;}
    .sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199;backdrop-filter:blur(3px);}
    .topbar{display:none;background:linear-gradient(90deg,var(--navy),var(--mid));color:#fff;padding:0 16px;align-items:center;gap:12px;position:sticky;top:0;z-index:150;height:54px;box-shadow:0 2px 12px rgba(15,31,92,.2);}
    .topbar .mb{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0;}
    .topbar .ttl{font-size:14px;font-weight:800;letter-spacing:2px;}
    .main-wrap{margin-left:260px;min-height:100vh;}

    /* ── CONTENT ──────────────────────────────────────── */
    .content-wrap{padding:28px 32px 60px;max-width:1100px;margin:0 auto;}

    /* ── PAGE HEADER ──────────────────────────────────── */
    .ph{background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 50%,var(--mid) 100%);border-radius:20px;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden;box-shadow:var(--shadow-md);}
    .ph::before{content:'';position:absolute;top:-70px;right:-70px;width:260px;height:260px;border:1px solid rgba(255,255,255,.07);border-radius:50%;}
    .ph::after{content:'';position:absolute;top:-35px;right:-35px;width:160px;height:160px;border:1px solid rgba(255,255,255,.05);border-radius:50%;}
    .ph-inner{display:flex;justify-content:space-between;align-items:center;gap:16px;position:relative;z-index:1;flex-wrap:wrap;}
    .ph-brand .ph-lbl{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.5);font-weight:600;text-transform:uppercase;}
    .ph-brand .ph-title{font-size:22px;font-weight:900;color:#fff;letter-spacing:1px;margin:4px 0 0;}
    .ph-stats{display:flex;gap:12px;flex-wrap:wrap;}
    .stat-pill{padding:8px 16px;border-radius:12px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);text-align:center;min-width:72px;}
    .stat-pill .sv{font-size:18px;font-weight:900;color:#fff;font-family:'DM Mono',monospace;line-height:1;}
    .stat-pill .sl{font-size:9px;color:rgba(255,255,255,.6);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-top:3px;}

    /* ── TOOLBAR ──────────────────────────────────────── */
    .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap;}
    .act-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .2s;white-space:nowrap;font-family:inherit;}
    .act-btn:active{transform:scale(.97);}
    .act-btn.primary{background:linear-gradient(135deg,var(--blue),var(--mid));color:#fff;box-shadow:0 4px 12px rgba(37,99,235,.25);}
    .act-btn.primary:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(37,99,235,.35);}
    .act-btn.ghost{background:var(--card);color:var(--sub);border:1.5px solid var(--border);}
    .act-btn.ghost:hover{border-color:var(--mid);color:var(--mid);}
    .act-btn.ghost.active-filter{background:var(--mid);color:#fff;border-color:var(--mid);}
    .search-wrap{flex:1;min-width:200px;position:relative;}
    .search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;}
    .search-inp{width:100%;padding:9px 12px 9px 36px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;outline:none;transition:all .2s;background:var(--card);}
    .search-inp:focus{border-color:var(--mid);box-shadow:0 0 0 3px rgba(37,99,235,.1);}

    /* ── STATUS FILTER TABS ───────────────────────────── */
    .filter-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
    .ftab{padding:6px 14px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--sub);transition:all .2s;font-family:inherit;}
    .ftab:hover{border-color:var(--mid);color:var(--mid);}
    .ftab.all.on{background:var(--mid);color:#fff;border-color:var(--mid);}
    .ftab.masuk.on{background:var(--s-masuk-bg);color:var(--s-masuk);border-color:var(--s-masuk);}
    .ftab.proses.on{background:var(--s-proses-bg);color:var(--s-proses);border-color:var(--s-proses);}
    .ftab.selesai.on{background:var(--s-selesai-bg);color:var(--s-selesai);border-color:var(--s-selesai);}
    .ftab.diambil.on{background:var(--s-diambil-bg);color:var(--s-diambil);border-color:var(--s-diambil);}
    .ftab .cnt{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;background:currentColor;color:#fff;font-size:9px;font-weight:800;margin-left:4px;opacity:.85;}
    .ftab.all.on .cnt{background:rgba(255,255,255,.3);}

    /* ── TICKET LIST ──────────────────────────────────── */
    .ticket-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;}
    .ticket-card{background:var(--card);border-radius:14px;border:1.5px solid var(--border);overflow:hidden;transition:all .25s;cursor:pointer;animation:cardIn .3s ease;}
    @keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .ticket-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--mid);}
    .tc-header{padding:14px 16px 10px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
    .tc-num{font-size:10px;font-weight:700;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.5px;}
    .tc-date{font-size:10px;color:var(--muted);font-weight:500;}
    .tc-name{font-size:14px;font-weight:800;color:var(--text);padding:0 16px 2px;}
    .tc-contact{font-size:11px;color:var(--sub);padding:0 16px 10px;display:flex;align-items:center;gap:5px;}
    .tc-body{padding:0 16px 12px;}
    .tc-barang{font-size:13px;font-weight:700;color:var(--blue);margin-bottom:4px;display:flex;align-items:center;gap:6px;}
    .tc-keluhan{font-size:11px;color:var(--sub);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .tc-footer{padding:10px 16px 14px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #f1f5f9;gap:8px;}
    .tc-supplier{font-size:11px;color:var(--sub);display:flex;align-items:center;gap:4px;}

    /* STATUS BADGE */
    .status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700;border:1px solid;}
    .status-badge.masuk  {background:var(--s-masuk-bg);color:var(--s-masuk);border-color:var(--s-masuk-border);}
    .status-badge.proses {background:var(--s-proses-bg);color:var(--s-proses);border-color:var(--s-proses-border);}
    .status-badge.selesai{background:var(--s-selesai-bg);color:var(--s-selesai);border-color:var(--s-selesai-border);}
    .status-badge.diambil{background:var(--s-diambil-bg);color:var(--s-diambil);border-color:var(--s-diambil-border);}
    .status-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
    .status-badge.masuk  .status-dot{background:var(--s-masuk);}
    .status-badge.proses .status-dot{background:var(--s-proses);animation:pulse 1.5s infinite;}
    .status-badge.selesai .status-dot{background:var(--s-selesai);}
    .status-badge.diambil .status-dot{background:var(--s-diambil);}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* ── EMPTY STATE ──────────────────────────────────── */
    .empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
    .empty-state .ei{font-size:48px;margin-bottom:12px;opacity:.5;}
    .empty-state .et{font-size:15px;font-weight:700;color:var(--sub);margin-bottom:6px;}
    .empty-state .es{font-size:12px;}

    /* ── FORM FIELDS ──────────────────────────────────── */
    .flbl{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;display:block;}
    .finput{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);background:#fff;transition:all .2s;outline:none;font-weight:500;}
    .finput:focus{border-color:var(--mid);box-shadow:0 0 0 3px rgba(37,99,235,.12);}
    .finput:hover:not(:focus){border-color:#94a3b8;}
    .finput::placeholder{color:var(--muted);font-weight:400;}
    textarea.finput{resize:vertical;min-height:80px;line-height:1.5;}
    .modal-content{border:none;border-radius:18px;overflow:hidden;box-shadow:0 20px 60px rgba(15,31,92,.18);}
    .mhd{background:linear-gradient(135deg,var(--navy),var(--mid));color:#fff;padding:22px 24px 18px;display:flex;justify-content:space-between;align-items:center;}
    .mhd h6{margin:0;font-weight:800;font-size:15px;}

    /* ── STATUS STEPPER ───────────────────────────────── */
    .stepper{display:flex;align-items:center;gap:0;margin:20px 0;}
    .step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;}
    .step:not(:last-child)::after{content:'';position:absolute;top:16px;left:50%;right:-50%;height:2px;background:var(--border);z-index:0;}
    .step.done:not(:last-child)::after{background:var(--mid);}
    .step-circle{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;border:2px solid var(--border);background:var(--card);color:var(--muted);position:relative;z-index:1;transition:all .3s;cursor:pointer;}
    .step.done .step-circle{background:var(--mid);border-color:var(--mid);color:#fff;}
    .step.active .step-circle{background:var(--card);border-color:var(--mid);color:var(--mid);box-shadow:0 0 0 4px rgba(37,99,235,.15);}
    .step-label{font-size:10px;font-weight:700;color:var(--muted);margin-top:6px;text-align:center;letter-spacing:.3px;text-transform:uppercase;}
    .step.done .step-label{color:var(--mid);}
    .step.active .step-label{color:var(--blue);font-weight:800;}

    /* ── DETAIL MODAL SECTIONS ────────────────────────── */
    .detail-section{margin-bottom:20px;}
    .detail-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
    .detail-section-title::after{content:'';flex:1;height:1px;background:var(--border);}
    .detail-row{display:flex;gap:8px;margin-bottom:8px;}
    .detail-key{font-size:12px;color:var(--muted);font-weight:600;min-width:110px;flex-shrink:0;}
    .detail-val{font-size:12px;color:var(--text);font-weight:600;flex:1;}
    .keluhan-box{background:#f8faff;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--text);line-height:1.6;white-space:pre-wrap;}
    .wa-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:10px;background:#25D366;color:#fff;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;}
    .wa-btn:hover{background:#1da851;transform:translateY(-1px);box-shadow:0 4px 14px rgba(37,211,102,.35);}
    .print-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:10px;background:var(--card);color:var(--sub);border:1.5px solid var(--border);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;}
    .print-btn:hover{border-color:var(--mid);color:var(--mid);}

    /* ── STATUS CHANGE BUTTONS ────────────────────────── */
    .status-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
    .sbtn{padding:8px 14px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid;transition:all .2s;font-family:inherit;}
    .sbtn:hover{transform:translateY(-1px);}
    .sbtn.masuk  {background:var(--s-masuk-bg);color:var(--s-masuk);border-color:var(--s-masuk);}
    .sbtn.proses {background:var(--s-proses-bg);color:var(--s-proses);border-color:var(--s-proses);}
    .sbtn.selesai{background:var(--s-selesai-bg);color:var(--s-selesai);border-color:var(--s-selesai);}
    .sbtn.diambil{background:var(--s-diambil-bg);color:var(--s-diambil);border-color:var(--s-diambil);}
    .sbtn.active-s{box-shadow:0 0 0 3px rgba(37,99,235,.2);transform:scale(1.03);}

    /* ── TOAST ────────────────────────────────────────── */
    #toast{position:fixed;bottom:28px;right:28px;z-index:9999;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;display:none;box-shadow:0 8px 28px rgba(0,0,0,.18);font-family:'Plus Jakarta Sans',sans-serif;max-width:300px;color:#fff;}
    #toast.show{display:flex;align-items:center;gap:8px;animation:toastIn .3s cubic-bezier(.34,1.56,.64,1);}
    @keyframes toastIn{from{opacity:0;transform:translateY(16px) scale(.93)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── PRINT ────────────────────────────────────────── */
    @media print{
      .sidebar,.topbar,.sb-overlay,.toolbar,.filter-tabs,#toast,.no-print{display:none!important;}
      .main-wrap{margin-left:0;}
      body{background:#fff;}
      .ph{box-shadow:none;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    }

    /* ── RESPONSIVE ───────────────────────────────────── */
    @media(max-width:991px){
      .sidebar{transform:translateX(-100%);}
      .sidebar.open{transform:translateX(0);}
      .sb-overlay.show{display:block;}
      .topbar{display:flex;}
      .main-wrap{margin-left:0;}
      .content-wrap{padding:14px 12px 60px;}
      .ticket-grid{grid-template-columns:1fr;}
      .ph-inner{flex-direction:column;align-items:flex-start;}
    }
  </style>
</head>

</div>
</div>

<div class="modal fade" id="modalDetail" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="mhd">
        <h6 id="detailTitle"><i class="bi bi-clipboard-check me-2"></i>Detail Tiket</h6>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ── Firebase ───────────────────────────────────────────
firebase.initializeApp({
  apiKey:"AIzaSyBjTKyBkKdZ9d1p2XS2PrLMpHsvvqK0jYk",
  authDomain:"form-pesanan-uniq.firebaseapp.com",
  databaseURL:"https://form-pesanan-uniq-default-rtdb.firebaseio.com",
  projectId:"form-pesanan-uniq",
  storageBucket:"form-pesanan-uniq.firebasestorage.app",
  messagingSenderId:"507202084583",
  appId:"1:507202084583:web:b097401aefce60bd03cc42"
});
const db = firebase.database();

// ── Auth Guard ─────────────────────────────────────────
const sessRaw = sessionStorage.getItem("uniqUser");
if (!sessRaw) { window.location.href = "login.html"; throw 0; }
const CURR_USER = JSON.parse(sessRaw);
const IS_ADMIN  = CURR_USER.role === "admin";
// Tiket service disimpan global (shared semua user bisa lihat)
const dbRef = db.ref("serviceTickets");

document.getElementById("sidebarUserName").textContent = CURR_USER.nama || CURR_USER.username;
document.getElementById("sidebarUserRole").textContent = IS_ADMIN ? "Administrator" : "User";
document.getElementById("sidebarAvatar").textContent   = (CURR_USER.nama || CURR_USER.username)[0].toUpperCase();
if (IS_ADMIN) {
  document.getElementById("navAdminLabel").style.display = "";
  document.getElementById("navAdminBtn").style.display   = "";
}
function doLogout(){ if(!confirm("Yakin mau keluar?"))return; sessionStorage.removeItem("uniqUser"); window.location.href="login.html"; }
function openSidebar(){ document.getElementById("sidebar").classList.add("open"); document.getElementById("sidebarOverlay").classList.add("show"); }
function closeSidebar(){ document.getElementById("sidebar").classList.remove("open"); document.getElementById("sidebarOverlay").classList.remove("show"); }

// ── Utils ──────────────────────────────────────────────
function showToast(msg,color="#1e3a8a",icon=""){
  const t=document.getElementById("toast");
  t.innerHTML=(icon?`<span>${icon}</span>`:"")+msg;
  t.style.background=color; t.classList.remove("show"); void t.offsetWidth; t.classList.add("show");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),3000);
}
const uid = () => Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2,5).toUpperCase();
const formatDate = d => d ? new Date(d).toLocaleDateString("id-ID",{day:"numeric",month:"short",year:"numeric"}) : "—";
const formatDatetime = d => d ? new Date(d).toLocaleString("id-ID",{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}) : "—";

const STATUS_LABEL = { masuk:"Masuk", proses:"Diproses", selesai:"Selesai", diambil:"Diambil" };
const STATUS_ICON  = { masuk:"⏳", proses:"🔄", selesai:"✅", diambil:"📦" };
const STATUS_ORDER = ["masuk","proses","selesai","diambil"];

// ── State ──────────────────────────────────────────────
let tickets = {};       // { id: ticketObj }
let activeFilter = "all";
let activeTicketId = null;
let editMode = false;

// ── Firebase Listener ──────────────────────────────────
dbRef.on("value", snap => {
  tickets = snap.val() || {};
  renderStats();
  renderList();
});

// ── Stats ──────────────────────────────────────────────
function renderStats(){
  const all = Object.values(tickets);
  const cnt = s => all.filter(t=>t.status===s).length;
  document.getElementById("statTotal").textContent   = all.length;
  document.getElementById("statMasuk").textContent   = cnt("masuk");
  document.getElementById("statProses").textContent  = cnt("proses");
  document.getElementById("statSelesai").textContent = cnt("selesai");
  document.getElementById("statDiambil").textContent = cnt("diambil");
  document.getElementById("cntAll").textContent      = all.length;
  document.getElementById("cntMasuk").textContent    = cnt("masuk");
  document.getElementById("cntProses").textContent   = cnt("proses");
  document.getElementById("cntSelesai").textContent  = cnt("selesai");
  document.getElementById("cntDiambil").textContent  = cnt("diambil");
}

// ── Filter ─────────────────────────────────────────────
function setFilter(f){
  activeFilter = f;
  document.querySelectorAll(".ftab").forEach(el=>{
    el.classList.toggle("on", el.dataset.f === f);
  });
  renderList();
}

// ── Render Ticket List ─────────────────────────────────
function renderList(){
  const q = document.getElementById("searchInp").value.trim().toLowerCase();
  const grid = document.getElementById("ticketGrid");
  let list = Object.values(tickets).sort((a,b)=> new Date(b.createdAt)-new Date(a.createdAt));

  if (activeFilter !== "all") list = list.filter(t=>t.status===activeFilter);
  if (q) list = list.filter(t=>
    (t.nama||"").toLowerCase().includes(q) ||
    (t.barang||"").toLowerCase().includes(q) ||
    (t.ticketNo||"").toLowerCase().includes(q) ||
    (t.keluhan||"").toLowerCase().includes(q)
  );

  if (!list.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="ei">🔧</div>
      <div class="et">${q?"Tiket tidak ditemukan":"Belum ada tiket servis"}</div>
      <div class="es">${q?"Coba kata kunci lain":"Klik \"Tiket Baru\" untuk menambahkan"}</div>
    </div>`;
    return;
  }

  grid.innerHTML = list.map(t => `
    <div class="ticket-card" onclick="openDetail('${t.id}')">
      <div class="tc-header">
        <span class="tc-num">#${t.ticketNo}</span>
        <span class="tc-date">${formatDate(t.createdAt)}</span>
      </div>
      <div class="tc-name">${t.nama}</div>
      <div class="tc-contact"><i class="bi bi-phone" style="font-size:10px"></i>${t.hp||"—"}</div>
      <div class="tc-body">
        <div class="tc-barang"><i class="bi bi-box-seam" style="font-size:12px;color:var(--muted)"></i>${t.barang}${t.merk?' <span style="font-size:11px;color:var(--muted);font-weight:500">\xb7 '+t.merk+'</span>':''}</div>
        <div class="tc-keluhan">${t.keluhan||"—"}</div>
      </div>
      <div class="tc-footer">
        <span class="tc-supplier"><i class="bi bi-building" style="font-size:10px"></i>${t.supplier||"Supplier belum ditentukan"}</span>
        <span class="status-badge ${t.status}"><span class="status-dot"></span>${STATUS_LABEL[t.status]}</span>
      </div>
    </div>
  `).join("");
}

// ── Open Detail ────────────────────────────────────────
function openDetail(id){
  activeTicketId = id;
  const t = tickets[id];
  if (!t) return;

  document.getElementById("detailTitle").innerHTML =
    `<i class="bi bi-clipboard-check me-2"></i>Tiket #${t.ticketNo}`;

  // Build stepper
  const stepIdx = STATUS_ORDER.indexOf(t.status);
  const stepperHTML = STATUS_ORDER.map((s,i)=>`
    <div class="step ${i<stepIdx?"done":""} ${i===stepIdx?"active":""}">
      <div class="step-circle" onclick="ubahStatus('${id}','${s}')" title="Set ke ${STATUS_LABEL[s]}">
        ${i<stepIdx?'<i class="bi bi-check-lg" style="font-size:13px"></i>':STATUS_ICON[s]}
      </div>
      <div class="step-label">${STATUS_LABEL[s]}</div>
    </div>
  `).join("");

  document.getElementById("detailBody").innerHTML = `
    <!-- Status Stepper -->
    <div class="detail-section">
      <div class="detail-section-title">Status Servis</div>
      <div class="stepper">${stepperHTML}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
        ${STATUS_ORDER.map(s=>'<button class="sbtn '+s+' '+(t.status===s?"active-s":"")+'" onclick="ubahStatus(\''+id+'\',\''+s+'\')">'+STATUS_ICON[s]+' '+STATUS_LABEL[s]+'</button>').join("")}
      </div>
    </div>

    <!-- Info Pelanggan -->
    <div class="detail-section">
      <div class="detail-section-title">Informasi Pelanggan</div>
      <div class="detail-row"><span class="detail-key">Nama</span><span class="detail-val">${t.nama}</span></div>
      <div class="detail-row"><span class="detail-key">No. HP / WA</span><span class="detail-val">${t.hp||"—"}</span></div>
    </div>

    <!-- Info Barang -->
    <div class="detail-section">
      <div class="detail-section-title">Barang yang Diservis</div>
      <div class="detail-row"><span class="detail-key">Nama Barang</span><span class="detail-val">${t.barang}</span></div>
      <div class="detail-row"><span class="detail-key">Merk / Model</span><span class="detail-val">${t.merk||"—"}</span></div>
      <div class="detail-row"><span class="detail-key">Supplier/Retur</span><span class="detail-val">${t.supplier||"Belum ditentukan"}</span></div>
      <div class="detail-row"><span class="detail-key">Est. Selesai</span><span class="detail-val">${formatDate(t.estimasi)}</span></div>
    </div>

    <!-- Keluhan -->
    <div class="detail-section">
      <div class="detail-section-title">Keluhan & Kerusakan</div>
      <div class="keluhan-box">${t.keluhan||"—"}</div>
    </div>

    ${t.catatan ? '<div class="detail-section"><div class="detail-section-title">Catatan Internal</div><div class="keluhan-box" style="background:#fffbeb;border-color:#fde68a">'+t.catatan+'</div></div>' : ""}

    <!-- Timeline -->
    <div class="detail-section">
      <div class="detail-section-title">Timeline</div>
      <div class="detail-row"><span class="detail-key">Masuk</span><span class="detail-val">${formatDatetime(t.createdAt)}</span></div>
      ${t.updatedAt?"<div class=\"detail-row\"><span class=\"detail-key\">Update Terakhir</span><span class=\"detail-val\">"+formatDatetime(t.updatedAt)+"</span></div>":""}
      <div class="detail-row"><span class="detail-key">Oleh</span><span class="detail-val">${t.createdBy||"—"}</span></div>
    </div>
  `;

  // Update WA btn label
  const waBtn = document.getElementById("btnWADetail");
  if (t.status === "selesai") {
    waBtn.innerHTML = '<i class="bi bi-whatsapp me-1"></i>Notif Selesai ke Pelanggan';
    waBtn.style.display = "";
  } else if (t.status === "diambil") {
    waBtn.innerHTML = '<i class="bi bi-whatsapp me-1"></i>Kirim Ringkasan ke Pelanggan';
    waBtn.style.display = "";
  } else {
    waBtn.style.display = "";
    waBtn.innerHTML = '<i class="bi bi-whatsapp me-1"></i>Notif WA';
  }

  new bootstrap.Modal(document.getElementById("modalDetail")).show();
}

// ── Ubah Status ────────────────────────────────────────
async function ubahStatus(id, status){
  const t = tickets[id];
  if (!t || t.status === status) return;
  const prev = t.status;
  await dbRef.child(id).update({ status, updatedAt: new Date().toISOString() });
  showToast(`Status diubah: ${STATUS_LABEL[prev]} → ${STATUS_LABEL[status]}`, "#2563eb", STATUS_ICON[status]);

  // Refresh detail if open
  if (document.getElementById("modalDetail").classList.contains("show")) {
    openDetail(id);
  }
}

// ── Form Tambah ────────────────────────────────────────
function openFormTambah(){
  editMode = false; activeTicketId = null;
  document.getElementById("modalFormTitle").innerHTML = '<i class="bi bi-tools me-2"></i>Tiket Servis Baru';
  document.getElementById("btnSimpanForm").innerHTML  = '<i class="bi bi-check-lg me-1"></i>Simpan Tiket';
  ["fNama","fHp","fBarang","fMerk","fKeluhan","fSupplier","fCatatan"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("fEstimasi").value = "";
  new bootstrap.Modal(document.getElementById("modalForm")).show();
  setTimeout(()=>document.getElementById("fNama").focus(), 400);
}

function editTiket(){
  const t = tickets[activeTicketId]; if (!t) return;
  bootstrap.Modal.getInstance(document.getElementById("modalDetail"))?.hide();
  editMode = true;
  document.getElementById("modalFormTitle").innerHTML = `<i class="bi bi-pencil me-2"></i>Edit Tiket #${t.ticketNo}`;
  document.getElementById("btnSimpanForm").innerHTML  = '<i class="bi bi-check-lg me-1"></i>Simpan Perubahan';
  document.getElementById("fNama").value      = t.nama     || "";
  document.getElementById("fHp").value        = t.hp       || "";
  document.getElementById("fBarang").value    = t.barang   || "";
  document.getElementById("fMerk").value      = t.merk     || "";
  document.getElementById("fKeluhan").value   = t.keluhan  || "";
  document.getElementById("fSupplier").value  = t.supplier || "";
  document.getElementById("fEstimasi").value  = t.estimasi || "";
  document.getElementById("fCatatan").value   = t.catatan  || "";
  setTimeout(()=>new bootstrap.Modal(document.getElementById("modalForm")).show(), 300);
}

async function simpanForm(){
  const nama    = document.getElementById("fNama").value.trim();
  const hp      = document.getElementById("fHp").value.trim();
  const barang  = document.getElementById("fBarang").value.trim();
  const keluhan = document.getElementById("fKeluhan").value.trim();

  if (!nama)    { showToast("⚠️ Nama pelanggan wajib diisi!", "#f59e0b"); document.getElementById("fNama").focus(); return; }
  if (!hp)      { showToast("⚠️ No. HP / WA wajib diisi!", "#f59e0b"); document.getElementById("fHp").focus(); return; }
  if (!barang)  { showToast("⚠️ Nama barang wajib diisi!", "#f59e0b"); document.getElementById("fBarang").focus(); return; }
  if (!keluhan) { showToast("⚠️ Keluhan wajib diisi!", "#f59e0b"); document.getElementById("fKeluhan").focus(); return; }

  const btn = document.getElementById("btnSimpanForm");
  btn.disabled = true;
  btn.innerHTML = `<span style="width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px"></span>Menyimpan...`;

  try {
    if (editMode && activeTicketId) {
      await dbRef.child(activeTicketId).update({
        nama, hp, barang,
        merk:      document.getElementById("fMerk").value.trim(),
        keluhan,
        supplier:  document.getElementById("fSupplier").value.trim(),
        estimasi:  document.getElementById("fEstimasi").value,
        catatan:   document.getElementById("fCatatan").value.trim(),
        updatedAt: new Date().toISOString()
      });
      showToast("✓ Tiket diperbarui!", "#2563eb", "✏️");
    } else {
      const id = uid();
      const ticketNo = "SVC-" + new Date().getFullYear().toString().slice(2) +
                       String(Object.keys(tickets).length + 1).padStart(4,"0");
      await dbRef.child(id).set({
        id, ticketNo, nama, hp, barang,
        merk:      document.getElementById("fMerk").value.trim(),
        keluhan,
        supplier:  document.getElementById("fSupplier").value.trim(),
        estimasi:  document.getElementById("fEstimasi").value,
        catatan:   document.getElementById("fCatatan").value.trim(),
        status:    "masuk",
        createdAt: new Date().toISOString(),
        createdBy: CURR_USER.nama || CURR_USER.username
      });
      showToast(`✓ Tiket ${ticketNo} dibuat!`, "#2563eb", "🔧");
    }
    bootstrap.Modal.getInstance(document.getElementById("modalForm"))?.hide();
  } catch(e) {
    showToast("❌ Gagal: " + e.message, "#ef4444");
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-check-lg me-1"></i>Simpan Tiket';
  }
}

async function hapusTiket(){
  const t = tickets[activeTicketId]; if (!t) return;
  if (!confirm(`Hapus tiket #${t.ticketNo} atas nama "${t.nama}"?\n\nTindakan ini tidak bisa dibatalkan!`)) return;
  await dbRef.child(activeTicketId).remove();
  bootstrap.Modal.getInstance(document.getElementById("modalDetail"))?.hide();
  showToast("Tiket dihapus", "#6b7280");
}

// ── WA Notification ────────────────────────────────────
function kirimWASelesai(){
  const t = tickets[activeTicketId]; if (!t) return;
  const hp = (t.hp||"").replace(/[^0-9]/g,"").replace(/^0/,"62");
  if (!hp) { showToast("⚠️ No. HP tidak ada!", "#f59e0b"); return; }

  const statusMsg = {
    masuk:   "Barang Anda telah kami *terima* dan sedang menunggu antrian servis.",
    proses:  "Barang Anda sedang dalam proses *perbaikan / pengecekan*.",
    selesai: "🎉 Barang Anda sudah *SELESAI* diperbaiki dan siap diambil!",
    diambil: "Terima kasih! Barang Anda telah *diambil*. Semoga puas dengan layanan kami."
  };

  let msg = `🔧 *INFO SERVIS — UNIQ CCTV AND NETWORK*\n`;
  msg += `━━━━━━━━━━━━━━━━\n`;
  msg += `📋 No. Tiket: *${t.ticketNo}*\n`;
  msg += `👤 Nama: ${t.nama}\n`;
  msg += `📦 Barang: ${t.barang}${t.merk ? " ("+t.merk+")" : ""}\n`;
  msg += `🔖 Status: *${STATUS_LABEL[t.status]}*\n`;
  msg += `━━━━━━━━━━━━━━━━\n`;
  msg += statusMsg[t.status] + "\n";
  if (t.estimasi && t.status !== "selesai" && t.status !== "diambil") {
    msg += `📅 Estimasi selesai: ${formatDate(t.estimasi)}\n`;
  }
  msg += `\nHubungi kami jika ada pertanyaan. Terima kasih! 🙏`;

  window.open(`https://wa.me/${hp}?text=${encodeURIComponent(msg)}`, "_blank");
}
